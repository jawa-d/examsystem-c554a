<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة الأسئلة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        
        /* Navbar */
        .navbar {
            position: fixed; top: 0; right: 0; left: 0;
            background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            padding: 15px 30px; z-index: 999;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar-brand { font-size: 1.8rem; font-weight: 800; color: #667eea; }
        .navbar-links { display: flex; gap: 20px; }
        .navbar-links a {
            text-decoration: none; color: #333; font-weight: 700;
            padding: 8px 15px; border-radius: 8px; transition: all 0.3s;
        }
        .navbar-links a:hover { background: #f0f0f0; color: #667eea; }
        .navbar-links a.active { background: #667eea; color: white; }
        
        body { padding-top: 100px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: white; border-radius: 20px; padding: 30px;
            margin-bottom: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        
        .card h2 { color: #333; margin-bottom: 20px; }
        
        .form-group {
            margin-bottom: 15px;
            display: flex; flex-direction: column;
        }
        .form-group label {
            font-weight: 700; color: #333; margin-bottom: 8px;
        }
        .form-group input, .form-group textarea, .form-group select {
            padding: 12px 15px; border: 2px solid #e0e0e0;
            border-radius: 12px; font-family: 'Tajawal', sans-serif;
            font-size: 1rem; transition: all 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none; border-color: #667eea; box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }
        
        .type-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .type-card {
            padding: 20px; border: 2px solid #e0e0e0; border-radius: 15px;
            cursor: pointer; text-align: center; transition: all 0.3s;
        }
        .type-card:hover { border-color: #667eea; background: #f8f9ff; }
        .type-card.active { border-color: #667eea; background: #667eea; color: white; }
        .type-card .icon { font-size: 2rem; margin-bottom: 10px; }
        .type-card .name { font-weight: 700; }
        
        .options-container { background: #f8f9ff; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .option-item {
            display: flex; gap: 10px; margin-bottom: 10px; align-items: center;
        }
        .option-item input { flex: 1; }
        .option-item button {
            padding: 8px 12px; background: #eb3349; color: white; border: none;
            border-radius: 8px; cursor: pointer; font-weight: 700;
        }
        .option-item button:hover { background: #c72f39; }
        
        .tf-answers { display: flex; gap: 20px; justify-content: space-around; padding: 15px; background: #f8f9ff; border-radius: 15px; }
        .tf-btn {
            padding: 15px 30px; border: 2px solid #e0e0e0; border-radius: 12px;
            cursor: pointer; font-weight: 700; transition: all 0.3s; flex: 1;
        }
        .tf-btn:hover { border-color: #667eea; }
        .tf-btn.selected { border-color: #667eea; background: #667eea; color: white; }
        
        .btn {
            padding: 12px 30px; border: none; border-radius: 12px;
            font-family: 'Tajawal', sans-serif; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; transform: translateY(-2px); }
        .btn-success { background: #11998e; color: white; margin-top: 15px; width: 100%; }
        .btn-success:hover { background: #0d7570; }
        
        .questions-list { margin-top: 30px; }
        .question-item {
            background: #f8f9ff; padding: 20px; border-radius: 15px;
            margin-bottom: 15px; border-right: 4px solid #667eea;
        }
        .question-item .q-text { font-weight: 700; color: #333; margin-bottom: 8px; }
        .question-item .q-meta {
            display: flex; gap: 15px; font-size: 0.9rem; color: #666; flex-wrap: wrap;
        }
        .question-item .btn-delete {
            background: #eb3349; color: white; padding: 6px 12px;
            border: none; border-radius: 8px; cursor: pointer; font-weight: 700;
            float: left;
        }
        .question-item .btn-delete:hover { background: #c72f39; }
        .clear-all { padding: 15px; text-align: center; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 20px; padding: 30px; max-width: 500px; width: 100%; text-align: center; }
        .modal h3 { color: #667eea; margin-bottom: 15px; }
        .modal p { color: #666; margin-bottom: 20px; }
        .modal button { padding: 10px 30px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; }
        
        .hidden { display: none; }
        .loading { text-align: center; padding: 20px; }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px; height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media (max-width: 600px) {
            .navbar { padding: 10px 15px; }
            .type-selector { grid-template-columns: 1fr; }
            .tf-answers { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <div class="navbar-brand">🎓 الامتحانات الذكية</div>
        <div class="navbar-links">
            <a href="questions.html" class="active">📝 الأسئلة</a>
            <a href="exam.html">📖 الامتحان</a>
            <a href="dashboard.html">📊 النتائج</a>
        </div>
    </div>

    <div class="container">
        <!-- Add Question Card -->
        <div class="card">
            <h2>➕ إضافة سؤال جديد</h2>
            
            <!-- Question Type Selector -->
            <div class="type-selector">
                <div class="type-card active" onclick="selectType('mcq')">
                    <div class="icon">☑️</div>
                    <div class="name">اختيار من متعدد</div>
                </div>
                <div class="type-card" onclick="selectType('tf')">
                    <div class="icon">✔️</div>
                    <div class="name">صحيح/خطأ</div>
                </div>
                <div class="type-card" onclick="selectType('text')">
                    <div class="icon">📝</div>
                    <div class="name">إجابة نصية</div>
                </div>
            </div>

            <!-- Question Text -->
            <div class="form-group">
                <label>نص السؤال</label>
                <textarea id="questionText" placeholder="أدخل نص السؤال..." rows="3"></textarea>
            </div>

            <!-- Time Input -->
            <div class="form-group">
                <label>الوقت المحدد (بالثواني)</label>
                <input type="number" id="questionTime" placeholder="30" value="30" min="5" max="300">
            </div>

            <!-- MCQ Options -->
            <div id="mcqSection">
                <label style="display:block; margin-bottom:15px; font-weight:700;">خيارات الإجابة</label>
                <div class="options-container" id="mcqOptions"></div>
                <button class="btn btn-primary" onclick="addMcqOption()" style="width:100%;">+ إضافة خيار</button>
            </div>

            <!-- T/F Options -->
            <div id="tfSection" class="hidden">
                <label style="display:block; margin-bottom:15px; font-weight:700;">الإجابة الصحيحة</label>
                <div class="tf-answers">
                    <div class="tf-btn" onclick="selectTf(true)">صحيح ✅</div>
                    <div class="tf-btn" onclick="selectTf(false)">خطأ ❌</div>
                </div>
            </div>

            <!-- Text Answer -->
            <div id="textSection" class="hidden">
                <div class="form-group">
                    <label>الإجابة الصحيحة</label>
                    <input type="text" id="textAnswer" placeholder="أدخل الإجابة الصحيحة...">
                </div>
            </div>

            <button class="btn btn-success" onclick="addQuestion()">✅ إضافة السؤال</button>
        </div>

        <!-- Questions List -->
        <div class="card questions-list">
            <h2>📋 الأسئلة المضافة (<span id="questionsCount">0</span>)</h2>
            <div id="questionsList"></div>
            <div class="clear-all">
                <button class="btn btn-primary" onclick="clearAllQuestions()" style="background:#eb3349;">🗑️ حذف جميع الأسئلة</button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 id="modalTitle">تنبيه</h3>
            <p id="modalMsg">رسالة</p>
            <button onclick="closeModal()">حسناً</button>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDwONMRFVhM-6-zio-ylUxAy5q4EQtjlWA",
            authDomain: "examsystem-c554a.firebaseapp.com",
            projectId: "examsystem-c554a",
            storageBucket: "examsystem-c554a.firebasestorage.app",
            messagingSenderId: "127469194735",
            appId: "1:127469194735:web:c658c1b00635cdc5083a1a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentType = 'mcq';
        let mcqOptions = [];
        let tfAnswer = true;
        let questions = [];

        // Type Selection
        function selectType(type) {
            currentType = type;
            document.querySelectorAll('.type-card').forEach(card => card.classList.remove('active'));
            event.target.closest('.type-card').classList.add('active');
            
            document.getElementById('mcqSection').classList.toggle('hidden', type !== 'mcq');
            document.getElementById('tfSection').classList.toggle('hidden', type !== 'tf');
            document.getElementById('textSection').classList.toggle('hidden', type !== 'text');
            
            mcqOptions = [];
            if (type === 'mcq') renderMcqOptions();
        }

        // MCQ Options
        function addMcqOption() {
            mcqOptions.push({ text: '', isCorrect: false });
            renderMcqOptions();
        }

        function renderMcqOptions() {
            const container = document.getElementById('mcqOptions');
            container.innerHTML = mcqOptions.map((opt, i) => `
                <div class="option-item">
                    <input type="radio" name="correctMcq" value="${i}" ${opt.isCorrect ? 'checked' : ''} onchange="setCorrectMcq(${i})">
                    <input type="text" placeholder="الخيار ${String.fromCharCode(65 + i)}" value="${opt.text}" onchange="mcqOptions[${i}].text=this.value">
                    <button onclick="mcqOptions.splice(${i}, 1); renderMcqOptions();">حذف</button>
                </div>
            `).join('');
        }

        function setCorrectMcq(idx) {
            mcqOptions.forEach((opt, i) => opt.isCorrect = i === idx);
        }

        // T/F
        function selectTf(val) {
            tfAnswer = val;
            document.querySelectorAll('.tf-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        // Add Question
        async function addQuestion() {
            const text = document.getElementById('questionText').value.trim();
            const time = parseInt(document.getElementById('questionTime').value) || 30;

            if (!text) {
                showModal('⚠️ تنبيه', 'الرجاء إدخال نص السؤال');
                return;
            }

            let question = { text, time, type: currentType };

            if (currentType === 'mcq') {
                if (mcqOptions.length < 2) {
                    showModal('⚠️ تنبيه', 'أضف خيارين على الأقل');
                    return;
                }
                const correctIdx = mcqOptions.findIndex(opt => opt.isCorrect);
                if (correctIdx === -1) {
                    showModal('⚠️ تنبيه', 'حدد الإجابة الصحيحة');
                    return;
                }
                question.options = mcqOptions.map(opt => opt.text);
                question.correct = correctIdx;
            } else if (currentType === 'tf') {
                question.correct = tfAnswer;
            } else if (currentType === 'text') {
                const answer = document.getElementById('textAnswer').value.trim();
                if (!answer) {
                    showModal('⚠️ تنبيه', 'أدخل الإجابة الصحيحة');
                    return;
                }
                question.correct = answer;
            }

            // Save to Firebase
            try {
                await db.collection('questions').add({
                    ...question,
                    createdAt: new Date(),
                    examId: 'default'
                });
                showModal('✅ نجاح', 'تم إضافة السؤال بنجاح');
                clearForm();
                loadQuestions();
            } catch (err) {
                showModal('❌ خطأ', 'حدث خطأ: ' + err.message);
            }
        }

        function clearForm() {
            document.getElementById('questionText').value = '';
            document.getElementById('questionTime').value = '30';
            document.getElementById('textAnswer').value = '';
            mcqOptions = [];
            tfAnswer = true;
            selectType('mcq');
        }

        // Load Questions
        async function loadQuestions() {
            try {
                const snapshot = await db.collection('questions').where('examId', '==', 'default').get();
                questions = [];
                snapshot.forEach(doc => {
                    questions.push({ id: doc.id, ...doc.data() });
                });
                renderQuestions();
            } catch (err) {
                console.error('خطأ:', err);
            }
        }

        function renderQuestions() {
            document.getElementById('questionsCount').textContent = questions.length;
            const container = document.getElementById('questionsList');
            if (questions.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#999; padding:20px;">لا توجد أسئلة حتى الآن</p>';
                return;
            }
            container.innerHTML = questions.map((q, i) => {
                let typeEmoji = q.type === 'mcq' ? '☑️' : q.type === 'tf' ? '✔️' : '📝';
                return `
                    <div class="question-item">
                        <button class="btn-delete" onclick="deleteQuestion('${q.id}')">حذف</button>
                        <div class="q-text">${i + 1}. ${q.text}</div>
                        <div class="q-meta">
                            <span>${typeEmoji} ${q.type}</span>
                            <span>⏱️ ${q.time} ثانية</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function deleteQuestion(id) {
            if (!confirm('هل أنت متأكد من حذف هذا السؤال؟')) return;
            try {
                await db.collection('questions').doc(id).delete();
                loadQuestions();
            } catch (err) {
                console.error('خطأ:', err);
            }
        }

        async function clearAllQuestions() {
            if (!confirm('هل أنت متأكد من حذف جميع الأسئلة؟')) return;
            try {
                const snapshot = await db.collection('questions').where('examId', '==', 'default').get();
                snapshot.forEach(doc => doc.ref.delete());
                loadQuestions();
            } catch (err) {
                console.error('خطأ:', err);
            }
        }

        function showModal(title, msg) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMsg').textContent = msg;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Load on init
        loadQuestions();
    </script>
</body>
</html>
